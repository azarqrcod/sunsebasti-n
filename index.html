<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max King</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #d4af37;
    font-family: Georgia, serif;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 30px 15px;
}

/* LOGO */
.logo img {
    width: 160px;
    margin-bottom: 15px;
}

/* TEXT */
.welcome {
    font-size: 22px;
    margin-bottom: 8px;
}

.subtitle {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 25px;
}

/* LINKS */
.links a {
    display: block;
    text-decoration: none;
    color: #d4af37;
    border: 1px solid #d4af37;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    transition: 0.3s;
    font-size: 15px;
}

.links a:hover {
    background: #d4af37;
    color: #000;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    font-size: 11px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="images/logo-max-king.png" alt="Max King Logo">
    </div>

    <!-- WELCOME -->
    <div class="welcome">
        Willkommen bei Max King
    </div>

    <div class="subtitle">
        San Sebastián Cheesecake & Premium Kaffee
    </div>

    <!-- LINKS -->
    <div class="links">
        <a href="menu-page-1.png">📋 Menü ansehen</a>
        <a href="https://maps.google.com/?q=Hobrechtstraße+70A+Berlin">📍 Standort</a>
        <a href="https://www.instagram.com/sansebastianmaxking">📸 Instagram</a>
        <a href="https://www.tiktok.com/@sansebastian191">🎵 TikTok</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Design & Erstellung: Azar <br>
        azarqrcod@gmail.com
    </div>

</div>

</body>
</html>
