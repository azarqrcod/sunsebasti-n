<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Max King – San Sebastián Cheesecake</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #000;
  color: white;
  text-align: center;
}

.container {
  padding: 30px 20px;
  max-width: 420px;
  margin: auto;
}

/* Logo */
.logo {
  width: 160px;
  margin-bottom: 20px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* Welcome */
.welcome {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  line-height: 1.8;
  margin-bottom: 25px;
  background: linear-gradient(45deg, #d4af37, #f7e7a0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Icons */
.social {
  display: flex;
  justify-content: space-between;
  margin: 25px 0;
}

.icon {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #d4af37;
  text-decoration: none;
  transition: 0.3s;
}

.icon:hover {
  transform: scale(1.1);
}

/* Social text */
.social-text {
  font-size: 13px;
  color: #ccc;
  margin-bottom: 30px;
}

/* Menu */
.menu img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* Footer */
.footer {
  font-size: 11px;
  color: #777;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo-max-king.PNG" class="logo">

<div class="welcome">
Willkommen bei Max King<br>
Danke für Ihr Vertrauen und Ihre Wahl
</div>

<div class="social">

<a href="https://maps.google.com/?q=Hobrechtstraße+70A+Berlin" class="icon" target="_blank">📍</a>

<a href="https://wa.me/4917672526577" class="icon" target="_blank">💬</a>

<a href="https://www.instagram.com/sansebastianmaxking/" class="icon" target="_blank">📸</a>

<a href="https://www.tiktok.com/@sansebastian191" class="icon" target="_blank">🎵</a>

</div>

<div class="social-text">
Folgen Sie uns auf unseren sozialen Kanälen und bleiben Sie auf dem Laufenden
</div>

<div class="menu">
<img src="menu-page-1.PNG">
<img src="menu-page-2.PNG">
<img src="menu-page-3.PNG">
</div>

<div class="footer">
Design & Erstellung: Azar<br>
azarqrcod@gmail.com
</div>

</div>

</body>
</html>
