<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max King</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    font-family:'Inter',sans-serif;
    color:#fff;
}

/* CONTAINER */
.container{
    max-width:420px;
    margin:auto;
    padding:25px 20px;
}

/* LOGO */
.logo{
    width:140px;
    display:block;
    margin:0 auto 15px;
}

/* TITLE */
h1{
    font-family:'Playfair Display',serif;
    text-align:center;
    color:#d4af37;
    font-size:38px;
    margin:10px 0 5px;
}

/* SUB */
.sub{
    text-align:center;
    font-size:14px;
    color:#aaa;
    margin-bottom:25px;
}

/* HERO IMAGE */
.hero{
    width:100%;
    border-radius:12px;
    margin-bottom:25px;
}

/* BUTTONS */
.btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px;
    margin-bottom:12px;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
    text-decoration:none;
    color:#fff;
    font-size:16px;
    transition:0.2s;
}

/* LEFT */
.left{
    display:flex;
    align-items:center;
    gap:12px;
}

/* ICON */
.icon{
    font-size:20px;
}

/* ARROW */
.arrow{
    opacity:0.5;
}

/* PRESS */
.btn:active{
    transform:scale(0.96);
    background:rgba(255,255,255,0.1);
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:13px;
    color:#888;
    margin-top:25px;
    line-height:1.6;
}

/* CREDIT */
.credit{
    text-align:center;
    font-size:11px;
    color:#555;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo-max-king.PNG" class="logo">

<h1>Willkommen</h1>

<div class="sub">
Danke, dass Sie sich für uns entschieden haben
</div>

<img src="menu-page-1.PNG" class="hero">

<a href="#" class="btn">
    <div class="left"><div class="icon">📍</div> Standort</div>
    <div class="arrow">›</div>
</a>

<a href="#" class="btn">
    <div class="left"><div class="icon">💬</div> WhatsApp</div>
    <div class="arrow">›</div>
</a>

<a href="#" class="btn">
    <div class="left"><div class="icon">📸</div> Instagram</div>
    <div class="arrow">›</div>
</a>

<a href="#" class="btn">
    <div class="left"><div class="icon">🎵</div> TikTok</div>
    <div class="arrow">›</div>
</a>

<div class="footer">
Folgen Sie uns, um keine neuen Menüs und Angebote zu verpassen
</div>

<div class="credit">
Design by Azar
</div>

</div>

</body>
</html>
