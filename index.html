<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max King – San Sebastián Cheesecake</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    text-align: center;
}

/* LOGO */
.logo {
    width: 180px;
    margin: 40px auto 20px;
}

/* TITLE */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    color: #d4af37;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 16px;
    color: #ccc;
    margin-bottom: 40px;
}

/* MENU IMAGE */
.menu {
    width: 90%;
    max-width: 420px;
    border-radius: 12px;
    margin-bottom: 40px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    padding: 0 20px;
    margin-bottom: 40px;
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 16px;
    text-decoration: none;
    color: #d4af37;
    font-size: 18px;
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

/* ICON */
.btn span {
    font-size: 22px;
}

/* CLICK EFFECT */
.btn:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.1);
}

/* FOOTER TEXT */
.footer {
    font-size: 14px;
    color: #aaa;
    padding: 0 20px 40px;
}

/* CREDIT */
.credit {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<img src="logo-max-king.PNG" class="logo">

<h1>Willkommen</h1>
<div class="subtitle">
Vielen Dank, dass Sie sich für uns entschieden haben
</div>

<img src="menu-page-1.PNG" class="menu">

<div class="buttons">
    <a href="#" class="btn"><span>📍</span> Standort</a>
    <a href="#" class="btn"><span>💬</span> WhatsApp</a>
    <a href="#" class="btn"><span>📸</span> Instagram</a>
    <a href="#" class="btn"><span>🎵</span> TikTok</a>
</div>

<div class="footer">
Folgen Sie uns in den sozialen Medien, damit Sie keine neuen Menüs und Angebote verpassen
</div>

<div class="credit">
Design by Azar
</div>

</body>
</html>
