<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Max King – San Sebastián Cheesecake</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    font-family:'Inter',sans-serif;
    color:#fff;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:25px 20px;
}

/* LOGO */
.logo{
    width:160px;
    margin-bottom:15px;
}

/* TITLE */
h1{
    font-family:'Playfair Display',serif;
    color:#d4af37;
    font-size:42px;
    margin:10px 0 5px;
}

/* SUB */
.sub{
    font-size:15px;
    color:#bbb;
    margin-bottom:30px;
}

/* MENU */
.menu img{
    width:100%;
    border-radius:14px;
    margin-bottom:15px;
}

/* BUTTONS */
.buttons{
    margin-top:25px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px;
    margin-bottom:12px;
    border-radius:16px;
    background:rgba(255,255,255,0.05);
    text-decoration:none;
    color:#fff;
    font-size:17px;
    transition:0.2s;
}

/* LEFT */
.left{
    display:flex;
    align-items:center;
    gap:12px;
}

/* ICON */
.icon{
    font-size:20px;
    color:#d4af37;
}

/* PRESS */
.btn:active{
    transform:scale(0.96);
    background:rgba(255,255,255,0.1);
}

/* FOOTER */
.footer{
    margin-top:25px;
    font-size:14px;
    color:#999;
    line-height:1.6;
}

/* CREDIT */
.credit{
    margin-top:15px;
    font-size:12px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

<img src="logo-max-king.PNG" class="logo">

<h1>Willkommen</h1>

<div class="sub">
Vielen Dank für Ihr Vertrauen und Ihre Wahl
</div>

<div class="menu">
<img src="menu-page-1.PNG">
<img src="menu-page-2.PNG">
<img src="menu-page-3.PNG">
</div>

<div class="buttons">

<a href="#" class="btn">
<div class="left"><div class="icon">📍</div> Standort</div>
<div>›</div>
</a>

<a href="#" class="btn">
<div class="left"><div class="icon">💬</div> WhatsApp</div>
<div>›</div>
</a>

<a href="#" class="btn">
<div class="left"><div class="icon">📸</div> Instagram</div>
<div>›</div>
</a>

<a href="#" class="btn">
<div class="left"><div class="icon">🎵</div> TikTok</div>
<div>›</div>
</a>

</div>

<div class="footer">
Folgen Sie uns auf unseren sozialen Kanälen, um keine neuen Menüs und Angebote zu verpassen
</div>

<div class="credit">
Design by Azar
</div>

</div>

</body>
</html>
