body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;

    text-align: center;
}

/* LOGO */
.logo {
    width: 140px;
    margin-top: 40px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* TITLE */
h1 {
    color: gold;
    margin-top: 15px;
    font-size: 28px;
}

.sub {
    color: #bbb;
    font-size: 14px;
    margin-bottom: 30px;
}

/* MENU */
.menu {
    width: 90%;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* BUTTONS */
.container {
    width: 90%;
    margin: auto;
}

.btn {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 60px;
    margin: 12px 0;
    border-radius: 18px;
    background: #111;
    color: gold;
    font-size: 16px;
    text-decoration: none;
    box-shadow: 0 0 10px rgba(255,215,0,0.1);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

/* TEXT */
.cta {
    margin-top: 25px;
    color: #ccc;
    font-size: 14px;
    line-height: 1.6;
}

/* EMAIL BUTTON */
.email-box {
    margin-top: 30px;
}

.email-btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    background: #111;
    color: gold;
    font-size: 14px;
    text-decoration: none;
    border: 1px solid rgba(255,215,0,0.2);
}

.email-btn:hover {
    background: gold;
    color: black;
}

/* PROMO */
.promo {
    margin-top: 10px;
    font-size: 13px;
    color: #bbb;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    font-size: 13px;
    color: #666;
}
</style>

</head>
